version: "3.8"

services:
  openwa:
    build:
      context: .
      dockerfile: Dockerfile
    image: openwa:latest
    container_name: openwa
    env_file:
      - .env
    environment:
      HOST: "${HOST}"
      FE_PORT: "${FE_PORT}"
      BE_PORT: "${BE_PORT}"
      OPENWA_DATA_DIR: "/app/storage"
      OPENWA_HOME: "/app/storage"
      OPENWA_AUTO_OPEN: "${OPENWA_AUTO_OPEN}"
      OPENWA_USE_WWEBJS: "${OPENWA_USE_WWEBJS}"
      OPENWA_ALLOW_MOCK: "${OPENWA_ALLOW_MOCK}"
      DATABASE_URL: "${DATABASE_URL}"
    volumes:
      - openwa-storage:/app/storage
    restart: unless-stopped

volumes:
  openwa-storage:
